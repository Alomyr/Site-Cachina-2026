<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cachina - Conecte-se</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg-dark: #0a1128;
        --accent-blue: #0ea5e9;
        --accent-indigo: #6366f1;
        --text-main: #e2e8f0;
        --glass: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.08);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg-dark);
        color: var(--text-main);
        min-height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow-x: hidden;
        position: relative;
        padding: 20px;
      }

      /* Efeito de Malha (Grid) de Fundo */
      body::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: -1;
      }

      /* Brilho Radial */
      body::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(14, 165, 233, 0.15) 0%,
          transparent 70%
        );
        filter: blur(60px);
        z-index: -1;
      }

      .main-card {
        background: rgba(10, 17, 40, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        width: 100%;
        max-width: 450px;
        padding: 40px 30px;
        text-align: center;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        z-index: 1;
      }

      .profile-section img {
        width: 160px;
        margin-bottom: 20px;
        filter: drop-shadow(0 0 15px rgba(14, 165, 233, 0.3));
      }

      .profile-section h1 {
        font-size: 1.5rem;
        font-weight: 800;
        margin-bottom: 8px;
        background: linear-gradient(to right, #fff, var(--accent-blue));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .profile-section p {
        color: #94a3b8;
        font-size: 0.9rem;
        margin-bottom: 30px;
      }

      /* Status Grid */
      .stats-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 30px;
      }

      .stat-box {
        background: var(--glass);
        border: 1px solid var(--glass-border);
        padding: 12px;
        border-radius: 12px;
      }

      .stat-box span {
        display: block;
        font-weight: 800;
        color: var(--accent-blue);
        font-size: 1.1rem;
      }

      .stat-box small {
        font-size: 0.65rem;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      /* Buttons List */
      .links-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .link-item {
        display: flex;
        align-items: center;
        padding: 16px 20px;
        background: var(--glass);
        border: 1px solid var(--glass-border);
        border-radius: 14px;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
      }

      .link-item i {
        width: 30px;
        font-size: 1.2rem;
        color: var(--accent-blue);
      }

      .link-item:hover {
        background: rgba(14, 165, 233, 0.1);
        border-color: var(--accent-blue);
        transform: translateY(-2px);
        box-shadow: 0 10px 20px -5px rgba(14, 165, 233, 0.2);
      }

      .link-item::after {
        content: "→";
        position: absolute;
        right: 20px;
        opacity: 0.5;
        transition: transform 0.3s ease;
      }

      .link-item:hover::after {
        transform: translateX(5px);
        opacity: 1;
      }

      /* Location Highlight */
      .location-card {
        margin-top: 30px;
        padding: 20px;
        background: linear-gradient(
          135deg,
          rgba(14, 165, 233, 0.1),
          transparent
        );
        border-radius: 16px;
        border-left: 3px solid var(--accent-blue);
        text-align: left;
      }

      .location-card h4 {
        font-size: 0.8rem;
        color: var(--accent-blue);
        text-transform: uppercase;
        margin-bottom: 5px;
      }

      .location-card p {
        font-size: 0.85rem;
        color: #cbd5e1;
        line-height: 1.5;
      }

      .footer-text {
        margin-top: 40px;
        font-size: 0.75rem;
        color: #475569;
        letter-spacing: 1px;
      }

      /* Responsividade iPhone */
      @media (max-width: 480px) {
        .main-card {
          padding: 30px 20px;
          background: transparent;
          border: none;
          box-shadow: none;
        }
        body {
          padding: 10px;
          align-items: flex-start;
        }
        body::before {
          width: 300px;
          height: 300px;
        }
      }
    </style>
  </head>
  <body>
    <div class="main-card">
      <div class="profile-section">
        <img src="./icons/cachina-logoo.png" alt="Cachina Logo" />
        <h1>Cachina Tecnologia</h1>
        <p>Soluções inteligentes para empresas do futuro.</p>
      </div>

      <div class="stats-container">
        <div class="stat-box">
          <span>100+</span>
          <small>Projetos</small>
        </div>
        <div class="stat-box">
          <span>100%</span>
          <small>ROI</small>
        </div>
        <div class="stat-box">
          <span>10.080 horas</span>
          <small>Suporte</small>
        </div>
      </div>

      <nav class="links-list">
        <a href="https://alomyr.github.io/Apresentra-ao-nova/" target="_blank" class="link-item">
          <i class="fas fa-globe"></i> Nosso Site Oficial
        </a>
        <a href="https://wa.me/5584991551968" target="_blank" class="link-item">
          <i class="fab fa-whatsapp"></i> WhatsApp Business
        </a>
        <a
          href="https://www.instagram.com/cachinasolucoes/"
          target="_blank"
          class="link-item"
        >
          <i class="fab fa-instagram"></i> Instagram
        </a>
        <a href="mailto:comercial@cachina.com.br" class="link-item">
          <i class="far fa-envelope"></i> E-mail Comercial
        </a>
        <a
          href="https://www.linkedin.com/in/grupo-cachina-122b903bb/"
          target="_blank"
          class="link-item"
        >
          <i class="fab fa-linkedin"></i> LinkedIn
        </a>
      </nav>

      <div class="location-card">
        <h4>📍 Onde estamos</h4>
        <p>R. Jequitinhonha, 2929 - Neópolis<br />Natal - RN | CEP 59088-210</p>
      </div>

      <div class="footer-text">BUSINESS_2026 | CACHINA SOLUTIONS</div>
    </div>
  </body>
</html>
