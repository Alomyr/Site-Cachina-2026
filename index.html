<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>Cachina - Soluções em Tecnologia</title>
    <meta
      name="description"
      content="Inspirando o futuro digital das empresas com mais de 20 anos de experiência em tecnologia"
    />
    <link rel="icon" href="./icons/favicon.ico" />

    <!-- Preload critical assets -->
    <link rel="preload" href="./css/styles.css" as="style" />
    <link rel="preload" href="./js/script.js" as="script" />
    <link rel="preload" href="./icons/cachina-logoo.png" as="image" />
    <link rel="preload" href="./icons/cachina-icon.png" as="image" />
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      as="style"
    />

    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="stylesheet" href="css/slides/slide-01.css">
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Critical CSS for initial load */
      body {
        margin: 0;
        padding: 0;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #0f172a;
        color: #f8fafc;
      }

      /* Loading spinner */
      .loading-spinner {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 50px;
        height: 50px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: #0ea5e9;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        z-index: 9999;
      }

      @keyframes spin {
        to {
          transform: translate(-50%, -50%) rotate(360deg);
        }
      }

      /* Touch optimization */
      * {
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }

      /* Smooth scrolling on mobile */
      html {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
    </style>
  </head>
  <body>
    <div id="presentation-container" class="presentation-container">
      <!-- Slide Content -->
      <div id="slide-content" class="slide-content">
        <!-- Slides will be dynamically loaded here -->
      </div>

      <!-- Navigation Buttons -->
      <button
        id="prev-btn"
        class="nav-btn prev-btn"
        aria-label="Slide anterior"
      >
        <svg
          class="nav-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <polyline points="15,18 9,12 15,6"></polyline>
        </svg>
      </button>

      <button id="next-btn" class="nav-btn next-btn" aria-label="Próximo slide">
        <svg
          class="nav-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <polyline points="9,18 15,12 9,6"></polyline>
        </svg>
      </button>

      <!-- Slide Counter -->
      <div class="slide-counter">
        <div class="glass-effect">
          <span id="slide-counter-text">1 / 17</span>
        </div>
      </div>
    </div>

    <script src="./js/script.js"></script>
  </body>
</html>
